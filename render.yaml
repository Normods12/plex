services:
  # ── Strapi Backend Web Service ───────────────────────────────────────────
  - type: web
    name: plexonics-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 1337
      - key: DATABASE_URL
        fromDatabase:
          name: plexonics-db
          property: connectionString
      - key: DATABASE_SSL
        value: true
      - key: APP_KEYS
        generateValue: true
      - key: API_TOKEN_SALT
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: TRANSFER_TOKEN_SALT
        generateValue: true
      - key: JWT_SECRET
        generateValue: true

  # ── Next.js Frontend Web Service ──────────────────────────────────────────
  - type: web
    name: plexonics-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_STRAPI_URL
        sync: false
      # The following must be manually configured in the Render Dashboard after deployment:
      - key: STRAPI_API_TOKEN
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: CONTACT_EMAIL
        sync: false
      - key: NEXT_PUBLIC_HCAPTCHA_SITE_KEY
        sync: false
      - key: HCAPTCHA_SECRET_KEY
        sync: false

databases:
  # ── PostgreSQL Database ──────────────────────────────────────────────────
  - name: plexonics-db
    plan: free
    databaseName: plexonics
    user: plexonics_db_user
