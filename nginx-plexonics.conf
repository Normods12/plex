# Plexonics Nginx Configuration
# Handles legacy Joomla PDF redirects, GZIP compression, and cache headers

server {
    listen 80;
    server_name www.plexonics.com plexonics.com;

    # Redirect HTTP to HTTPS (uncomment in production)
    # return 301 https://$server_name$request_uri;

    # ── Legacy Joomla PDF redirects ───────────────────────────────────────────
    # Redirect /images/DATASHEETS/*.pdf → Strapi media URL
    location ~ ^/images/DATASHEETS/(.+\.pdf)$ {
        return 301 https://media.plexonics.com/plexonics/datasheets/$1;
    }

    # Redirect /images/MANUALS/*.pdf → Strapi media URL
    location ~ ^/images/MANUALS/(.+\.pdf)$ {
        return 301 https://media.plexonics.com/plexonics/manuals/$1;
    }

    # ── Legacy Joomla /index.php/ redirects ───────────────────────────────────
    # Strip /index.php prefix and redirect to clean URL
    # (Next.js handles these too, but this is a fallback for CDN/load balancer)
    location ~ ^/index\.php/(.*)$ {
        return 301 /$1;
    }

    # ── Proxy to Next.js ──────────────────────────────────────────────────────
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── GZIP compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;

    # ── Cache headers ─────────────────────────────────────────────────────────
    # Product images: 30 days
    location ~* \.(jpg|jpeg|png|gif|webp|svg)$ {
        proxy_pass http://localhost:3000;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # PDFs: 7 days
    location ~* \.pdf$ {
        proxy_pass http://localhost:3000;
        expires 7d;
        add_header Cache-Control "public";
    }

    # HTML: no-cache (always revalidate)
    location ~* \.html$ {
        proxy_pass http://localhost:3000;
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }
}

